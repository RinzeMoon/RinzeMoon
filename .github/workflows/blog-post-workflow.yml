name: Latest Blog Posts

on:
  schedule:
    # 每天 UTC 0:00 和 12:00 各运行一次（北京时间 8:00 和 20:00）
    - cron: '0 0,12 * * *'
  workflow_dispatch:
    # 允许手动触发

permissions:
  contents: write

jobs:
  update-readme-with-blog:
    name: Update README with latest blog posts
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fetch latest blog posts
        uses: gautamkrishnar/blog-post-workflow@master
        with:
          feed_list: "https://rinzemoon.top/feed.xml"
          max_post_count: 5
          date_format: "yyyy/mm/dd"
          template: "<tr><td bgcolor='#faf8f5'><b>📝 <a href='$url'>$title</a></b><br><sub>&nbsp;&nbsp;$date</sub></td></tr><tr><td height='6'></td></tr>$newline"
          commit_message: "📝 docs: auto-update README with latest blog posts"
          committer_username: "github-actions[bot]"
          committer_email: "github-actions[bot]@users.noreply.github.com"
          # 中文标题显示
          user_agent: "Mozilla/5.0"
